<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rogneur Manuel 10x15</title>
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; background: #f4f4f9; color: #333; }
        h1 { text-align: center; font-size: 24px; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 15px; }
        input[type="file"], button { padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; width: 100%; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        .toolbar { display: flex; gap: 10px; }
        .btn-secondary { background: #6c757d; flex: 1; }
        .btn-secondary:hover { background: #5a6268; }

        .cropper-container { height: 400px; background: #eee; border-radius: 8px; overflow: hidden; display: none; align-items: center; justify-content: center; border: 1px dashed #ccc; }
        img { max-width: 100%; display: block; }
        
        #status { text-align: center; font-size: 14px; font-weight: 500; padding: 12px; border-radius: 8px; border: 1px solid transparent; transition: all 0.3s ease; }
        .status-idle { background: #e9ecef; color: #495057; border-color: #dee2e6; }
        .status-loading { background: #fff3cd; color: #856404; border-color: #ffeeba; }
        .status-success { background: #d4edda; color: #155724; border-color: #c3e6cb; }
        .status-error { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }
    </style>
</head>
<body>

    <h1>📐 Cadrage 10x15</h1>
    <div class="subtitle">Ajuste visuellement avant l'impression</div>
    
    <div class="card">
        <input type="file" id="fileInput" accept=".pdf, .png, .jpg, .jpeg">

        <div class="cropper-container" id="cropperWrapper">
            <img id="imageToCrop" src="">
        </div>

        <div class="toolbar" id="toolbar" style="display: none;">
            <button class="btn-secondary" id="btnRotateLeft">↺ Pivoter</button>
            <button class="btn-secondary" id="btnRotateRight">Pivoter ↻</button>
        </div>

        <button id="sendBtn" disabled>🚀 Imprimer l'étiquette</button>
        <div id="status" class="status-idle">En attente d'un fichier...</div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        
        const fileInput = document.getElementById('fileInput');
        const cropperWrapper = document.getElementById('cropperWrapper');
        const imageToCrop = document.getElementById('imageToCrop');
        const toolbar = document.getElementById('toolbar');
        const btnRotateLeft = document.getElementById('btnRotateLeft');
        const btnRotateRight = document.getElementById('btnRotateRight');
        const sendBtn = document.getElementById('sendBtn');
        const statusDiv = document.getElementById('status');

        let cropper = null;

        function updateStatus(message, state = 'idle') {
            statusDiv.innerText = message;
            statusDiv.className = `status-${state}`;
        }

        // Le chargement est maintenant sécurisé et asynchrone
        function initCropper(imageSource) {
            if (cropper) {
                cropper.destroy();
                cropper = null;
            }

            // On purge l'ancienne image pour éviter les bugs
            imageToCrop.src = '';

            // Événement DÉCLENCHÉ SEULEMENT quand l'image est 100% chargée
            imageToCrop.onload = () => {
                cropperWrapper.style.display = 'block';
                toolbar.style.display = 'flex';
                sendBtn.disabled = false;
                updateStatus("Glisse et zoome pour remplir le cadre.", "success");

                cropper = new Cropper(imageToCrop, {
                    aspectRatio: 10 / 15,
                    viewMode: 1,
                    dragMode: 'move',
                    autoCropArea: 0.9,
                    background: true,
                    guides: true,
                    highlight: false,
                    cropBoxMovable: false,
                    cropBoxResizable: false
                });
            };

            // Événement DÉCLENCHÉ si le fichier est corrompu ou au format HEIC
            imageToCrop.onerror = () => {
                updateStatus("❌ Format d'image invalide. (Attention, les photos HEIC d'iPhone ne sont pas supportées, utilise un JPG ou PDF).", "error");
            };

            // On injecte la source une fois les sécurités en place
            imageToCrop.src = imageSource;
        }

        fileInput.addEventListener('change', async () => {
            const file = fileInput.files[0];
            if (!file) {
                updateStatus("En attente d'un fichier...", "idle");
                return;
            }

            // Si c'est un format HEIC, on bloque direct
            if (file.name.toLowerCase().endsWith('.heic')) {
                updateStatus("❌ Format HEIC non supporté. Prends une capture d'écran de ta photo ou utilise un PDF.", "error");
                fileInput.value = '';
                return;
            }

            updateStatus("Décodage du fichier en cours...", "loading");

            try {
                if (file.type === 'application/pdf') {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                    const page = await pdf.getPage(1);
                    
                    const viewport = page.getViewport({ scale: 2.0 });
                    const canvas = document.createElement('canvas');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    const ctx = canvas.getContext('2d');
                    
                    await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                    initCropper(canvas.toDataURL('image/jpeg'));
                } else if (file.type.startsWith('image/')) {
                    initCropper(URL.createObjectURL(file));
                } else {
                    throw new Error("Sélectionne un PDF ou une image (JPG/PNG).");
                }
            } catch (err) {
                updateStatus(`❌ Erreur : ${err.message}`, "error");
                fileInput.value = ''; 
                sendBtn.disabled = true;
            }
        });

        btnRotateLeft.addEventListener('click', () => cropper && cropper.rotate(-90));
        btnRotateRight.addEventListener('click', () => cropper && cropper.rotate(90));

        sendBtn.addEventListener('click', async () => {
            if (!cropper) return;

            sendBtn.disabled = true;
            updateStatus("Génération de l'étiquette 10x15...", "loading");

            try {
                const croppedCanvas = cropper.getCroppedCanvas({ width: 800, height: 1200 });
                if (!croppedCanvas) throw new Error("Impossible de recadrer l'image.");

                const imgData = croppedCanvas.toDataURL('image/jpeg', 0.9);
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: [100, 150] });

                pdf.addImage(imgData, 'JPEG', 0, 0, 100, 150);
                const pdfBlob = pdf.output('blob');

                updateStatus("🚀 Envoi vers le serveur n8n...", "loading");
                
                const formData = new FormData();
                formData.append('attachment_0', pdfBlob, `etiquette_manuelle.pdf`);

                const webhookUrl = 'http://192.168.1.55.nip.io:5678/webhook-test/impression-etiquette';

                const response = await fetch(webhookUrl, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    updateStatus("🖨️ Impression lancée avec succès !", "success");
                } else {
                    throw new Error(`Le serveur n8n a refusé (Code: ${response.status}).`);
                }

            } catch (err) {
                if (err.name === 'TypeError' && err.message.includes('fetch')) {
                    updateStatus("❌ Impossible de joindre n8n. Vérifie que le boîtier est allumé et sur le Wi-Fi.", "error");
                } else {
                    updateStatus(`❌ Échec : ${err.message}`, "error");
                }
            } finally {
                sendBtn.disabled = false;
            }
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
        }
    </script>
</body>
</html>
