<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rogneur Manuel 10x15</title>
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; background: #f4f4f9; color: #333; }
        h1 { text-align: center; font-size: 24px; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 15px; }
        input[type="file"], button { padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; width: 100%; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        .toolbar { display: flex; gap: 10px; }
        .btn-secondary { background: #6c757d; flex: 1; }
        
        /* CORRECTION MAJEURE ICI : Conteneur strict et simple */
        #cropperWrapper { width: 100%; height: 450px; background: #ddd; display: none; position: relative; margin: 0 auto; }
        #imageToCrop { display: block; max-width: 100%; }
        
        #status { text-align: center; font-size: 14px; font-weight: 500; padding: 12px; border-radius: 8px; border: 1px solid transparent; }
        .status-idle { background: #e9ecef; color: #495057; border-color: #dee2e6; }
        .status-loading { background: #fff3cd; color: #856404; border-color: #ffeeba; }
        .status-success { background: #d4edda; color: #155724; border-color: #c3e6cb; }
        .status-error { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }
    </style>
</head>
<body>

    <h1>📐 Cadrage 10x15</h1>
    <div class="subtitle">Ajuste visuellement avant l'impression</div>
    
    <div class="card">
        <input type="file" id="fileInput" accept=".pdf, .png, .jpg, .jpeg">

        <div id="cropperWrapper">
            <img id="imageToCrop" src="">
        </div>

        <div class="toolbar" id="toolbar" style="display: none;">
            <button class="btn-secondary" id="btnRotateLeft">↺ Pivoter</button>
            <button class="btn-secondary" id="btnRotateRight">Pivoter ↻</button>
        </div>

        <button id="sendBtn" disabled>🚀 Imprimer l'étiquette</button>
        <div id="status" class="status-idle">En attente d'un fichier...</div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        
        const fileInput = document.getElementById('fileInput');
        const cropperWrapper = document.getElementById('cropperWrapper');
        const imageToCrop = document.getElementById('imageToCrop');
        const toolbar = document.getElementById('toolbar');
        const btnRotateLeft = document.getElementById('btnRotateLeft');
        const btnRotateRight = document.getElementById('btnRotateRight');
        const sendBtn = document.getElementById('sendBtn');
        const statusDiv = document.getElementById('status');

        let cropper = null;

        function updateStatus(message, state = 'idle') {
            statusDiv.innerText = message;
            statusDiv.className = `status-${state}`;
        }

        function initCropper(imageSource) {
            if (cropper) {
                cropper.destroy();
                cropper = null;
            }

            // 1. On affiche la div "en dur" AVANT de donner l'image
            cropperWrapper.style.display = 'block';
            toolbar.style.display = 'flex';
            sendBtn.disabled = true;

            // 2. On charge la source
            imageToCrop.src = imageSource;

            // 3. Quand l'image est prête...
            imageToCrop.onload = function() {
                // CORRECTION MAJEURE : On force une pause de 150ms pour laisser le navigateur 
                // dessiner les pixels à l'écran avant de lancer l'outil par dessus.
                setTimeout(() => {
                    try {
                        cropper = new Cropper(imageToCrop, {
                            aspectRatio: 10 / 15,
                            viewMode: 1,
                            dragMode: 'move',
                            autoCropArea: 0.9,
                            background: true,
                            guides: true,
                            highlight: false,
                            cropBoxMovable: false,
                            cropBoxResizable: false,
                            ready() {
                                sendBtn.disabled = false;
                                updateStatus("✅ Ajuste visuellement ton étiquette.", "success");
                            }
                        });
                    } catch (e) {
                        console.error(e);
                        updateStatus("❌ Erreur d'interface.", "error");
                    }
                }, 150);
            };

            imageToCrop.onerror = () => {
                updateStatus("❌ Impossible de lire l'image.", "error");
            };
        }

        fileInput.addEventListener('change', async () => {
            const file = fileInput.files[0];
            if (!file) return;

            updateStatus("Préparation de l'image...", "loading");

            try {
                if (file.type === 'application/pdf') {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                    const page = await pdf.getPage(1);
                    
                    // CORRECTION MAJEURE : Baisse de l'échelle à 1.5 pour éviter que 
                    // la mémoire de Safari/Chrome mobile ne fasse disparaître l'image.
                    const viewport = page.getViewport({ scale: 1.5 });
                    const canvas = document.createElement('canvas');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    const ctx = canvas.getContext('2d');
                    
                    await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                    initCropper(canvas.toDataURL('image/jpeg', 0.8)); // Compression légère ajoutée
                } else if (file.type.startsWith('image/')) {
                    initCropper(URL.createObjectURL(file));
                }
            } catch (err) {
                updateStatus(`❌ Erreur : ${err.message}`, "error");
                cropperWrapper.style.display = 'none';
                toolbar.style.display = 'none';
            }
        });

        btnRotateLeft.addEventListener('click', () => cropper && cropper.rotate(-90));
        btnRotateRight.addEventListener('click', () => cropper && cropper.rotate(90));

        sendBtn.addEventListener('click', async () => {
            if (!cropper) return;
            sendBtn.disabled = true;
            updateStatus("🚀 Envoi vers l'imprimante...", "loading");

            try {
                const croppedCanvas = cropper.getCroppedCanvas({ width: 800, height: 1200 });
                const imgData = croppedCanvas.toDataURL('image/jpeg', 0.9);
                
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: [100, 150] });

                pdf.addImage(imgData, 'JPEG', 0, 0, 100, 150);
                const pdfBlob = pdf.output('blob');
                
                const formData = new FormData();
                formData.append('attachment_0', pdfBlob, `etiquette_manuelle.pdf`);

                const webhookUrl = 'http://192.168.1.55.nip.io:5678/webhook-test/impression-etiquette';

                const response = await fetch(webhookUrl, { method: 'POST', body: formData });

                if (response.ok) {
                    updateStatus("🖨️ Impression lancée avec succès !", "success");
                } else {
                    throw new Error("Refusé par n8n.");
                }
            } catch (err) {
                updateStatus("❌ Erreur d'envoi. Vérifie ta connexion au réseau local.", "error");
            } finally {
                sendBtn.disabled = false;
            }
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
